services:
  - type: web
    name: gnnaaarium-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    buildFilter:
      paths:
        - requirements.txt
        - app/**
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
